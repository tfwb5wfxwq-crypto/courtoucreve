<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Court ou Crève - Saison 2</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../favicon.png">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5TS0QBS0MJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5TS0QBS0MJ');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a0a0a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(185, 28, 28, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: backgroundMove 20s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes backgroundMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .container {
      max-width: 600px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 15px;
      filter: drop-shadow(0 4px 20px rgba(185, 28, 28, 0.4));
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 7vw, 72px);
      letter-spacing: 6px;
      background: linear-gradient(135deg, #B91C1C 0%, #DC2626 50%, #EF4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(185, 28, 28, 0.5);
      margin-bottom: 10px;
      animation: textGlow 2s ease-in-out infinite alternate;
    }

    @keyframes textGlow {
      from { filter: drop-shadow(0 0 10px rgba(185, 28, 28, 0.5)); }
      to { filter: drop-shadow(0 0 30px rgba(185, 28, 28, 0.8)); }
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      margin: 0 auto 25px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(185, 28, 28, 0.2);
      animation: fadeInUp 0.8s ease-out 0.3s both;
      cursor: pointer;
    }

    .video-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.4s ease;
    }

    .video-container:hover::before {
      opacity: 0.7;
    }

    .video-container.playing::before {
      opacity: 0;
    }

    .video-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.08;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    .video-container video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
      filter: brightness(0.75);
      transition: all 0.4s ease;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .video-container:hover video {
      filter: brightness(0.9);
      transform: scale(1.02);
    }

    .video-container.playing video {
      filter: brightness(1);
    }

    /* Bouton play identique au site principal */
    .gallery-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .play-btn {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.9) 0%, rgba(220, 38, 38, 0.95) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(185, 28, 28, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      position: relative;
    }

    .play-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.6;
    }

    .play-btn::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 22px solid white;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      margin-left: 6px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .video-container:hover .play-btn {
      transform: scale(1.12);
      background: linear-gradient(135deg, #B91C1C 0%, #DC2626 100%);
      box-shadow: 0 12px 48px rgba(185, 28, 28, 0.6),
                  inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .diffusion {
      text-align: center;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .diffusion-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .diffusion-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 4.5vw, 40px);
      letter-spacing: 3px;
      background: linear-gradient(135deg, #ffffff 0%, #e5e5e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-block;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .back-link:hover {
      background: linear-gradient(135deg, #B91C1C 0%, #DC2626 100%);
      border-color: #DC2626;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(185, 28, 28, 0.4);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .logo {
        width: 100px;
      }

      h1 {
        letter-spacing: 4px;
      }

      .video-container {
        border-radius: 12px;
        max-width: 100%;
      }

      .play-btn {
        width: 60px;
        height: 60px;
      }

      .play-btn::after {
        border-left: 18px solid white;
        border-top: 11px solid transparent;
        border-bottom: 11px solid transparent;
        margin-left: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="../logo.svg" alt="Court ou Crève" class="logo">
      <h1>SAISON 2</h1>
    </header>

    <div class="video-container" id="videoContainer">
      <video
        id="teaser"
        poster="../teaser-poster.jpg"
        preload="metadata"
        playsinline
        muted
      >
        <source src="../teaser-saison-2.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la lecture de vidéo.
      </video>
      <div class="gallery-play" id="playButton">
        <div class="play-btn"></div>
      </div>
    </div>

    <div class="diffusion">
      <div class="diffusion-label">Diffusion</div>
      <div class="diffusion-date">Dimanche 15 Mars</div>
      <a href="../" class="back-link">← Retour au site</a>
    </div>
  </div>

  <script>
    const videoContainer = document.getElementById('videoContainer');
    const video = document.getElementById('teaser');
    const playButton = document.getElementById('playButton');
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // ===== ALERTE TELEGRAM VISITE PAGE TEASER =====
    (async function sendTeaserAlert() {
      const BOT_TOKEN = '8499455083:AAHGSEIsvQUuOSnaQhj-PpcIX5lUzWXEkt8';
      const CHAT_ID = '5305215400';

      try {
        // Timestamp immédiat
        const timestamp = new Date().toLocaleString('fr-FR', {
          timeZone: 'Europe/Paris',
          dateStyle: 'full',
          timeStyle: 'medium'
        });

        // Détection device
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const isTablet = /iPad|Android.*Tablet/i.test(navigator.userAgent);
        const device = isTablet ? '📱 Tablette' : (isMobile ? '📱 Mobile' : '💻 Desktop');

        // Tenter de récupérer IP et localisation (avec timeout)
        let ip = 'Récupération...';
        let location = 'Récupération...';
        let org = 'Récupération...';

        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3000); // 3s timeout

          const response = await fetch('https://ipapi.co/json/', {
            signal: controller.signal
          });
          clearTimeout(timeoutId);

          const data = await response.json();
          ip = data.ip || 'IP inconnue';
          const city = data.city || 'Ville inconnue';
          const region = data.region || '';
          const country = data.country_name || 'Pays inconnu';
          org = data.org || 'ISP inconnu';
          location = `${city}${region ? ', ' + region : ''}, ${country}`;
        } catch (geoError) {
          console.log('Impossible de récupérer la géolocalisation:', geoError);
        }

        // Message Telegram
        const message = `🚨 *ALERTE TEASER SAISON 2*\n\n` +
          `📍 *Localisation:* ${location}\n` +
          `🌐 *IP:* \`${ip}\`\n` +
          `📡 *ISP:* ${org}\n` +
          `${device}\n` +
          `🕐 ${timestamp}\n\n` +
          `_${navigator.userAgent.substring(0, 100)}_`;

        // Envoyer via Telegram Bot API
        const telegramResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'Markdown'
          })
        });

        const result = await telegramResponse.json();

        if (result.ok) {
          console.log('✅ Alerte Telegram envoyée avec succès');
        } else {
          console.error('❌ Erreur Telegram API:', result);
        }
      } catch (error) {
        console.error('❌ Erreur alerte Telegram:', error);

        // Fallback: envoyer alerte minimale
        try {
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: `🚨 *VISITE TEASER SAISON 2*\n\nQuelqu'un a visité la page teaser !\n${new Date().toLocaleString('fr-FR')}`
            })
          });
          console.log('✅ Alerte fallback envoyée');
        } catch (fallbackError) {
          console.error('❌ Même le fallback a échoué:', fallbackError);
        }
      }
    })();

    // Fonction pour reset la vidéo
    function resetVideo() {
      video.pause();
      video.controls = false;
      video.muted = true;
      playButton.style.display = 'block';
      videoContainer.classList.remove('playing');
    }

    // Protection contre le clic droit (désactiver téléchargement)
    video.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      return false;
    });

    // Click to play/pause
    videoContainer.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();

      if (video.paused) {
        // Play
        video.controls = !isMobile;
        video.muted = false;
        video.play();
        playButton.style.display = 'none';
        videoContainer.classList.add('playing');
      } else {
        // Pause
        resetVideo();
      }
    });

    // Reset when ended
    video.addEventListener('ended', () => {
      video.currentTime = 0;
      resetVideo();
    });

    // Pause when scrolling away
    const videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting && !video.paused) {
          resetVideo();
        }
      });
    }, { threshold: 0.5 });
    videoObserver.observe(videoContainer);

    // Pause when tab hidden
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && !video.paused) {
        resetVideo();
      }
    });
  </script>
</body>
</html>
