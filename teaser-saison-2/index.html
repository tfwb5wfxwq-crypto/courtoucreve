<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Court ou Crève - Saison 2</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a0a0a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(185, 28, 28, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: backgroundMove 20s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes backgroundMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .container {
      max-width: 600px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 15px;
      filter: drop-shadow(0 4px 20px rgba(185, 28, 28, 0.4));
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 7vw, 72px);
      letter-spacing: 6px;
      background: linear-gradient(135deg, #B91C1C 0%, #DC2626 50%, #EF4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(185, 28, 28, 0.5);
      margin-bottom: 10px;
      animation: textGlow 2s ease-in-out infinite alternate;
    }

    @keyframes textGlow {
      from { filter: drop-shadow(0 0 10px rgba(185, 28, 28, 0.5)); }
      to { filter: drop-shadow(0 0 30px rgba(185, 28, 28, 0.8)); }
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      margin: 0 auto 25px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(185, 28, 28, 0.2);
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(185, 28, 28, 0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border: 3px solid rgba(255, 255, 255, 0.3);
      opacity: 0;
      pointer-events: none;
    }

    .video-container:hover .play-button,
    video:not([playing]) ~ .play-button {
      opacity: 1;
    }

    video[playing] ~ .play-button {
      opacity: 0;
      pointer-events: none;
    }

    .play-button::after {
      content: '';
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 15px 0 15px 25px;
      border-color: transparent transparent transparent white;
      margin-left: 5px;
    }

    .play-button:hover {
      transform: translate(-50%, -50%) scale(1.1);
      background: rgba(220, 38, 38, 1);
      box-shadow: 0 0 30px rgba(185, 28, 28, 0.6);
    }

    .diffusion {
      text-align: center;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .diffusion-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .diffusion-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 4.5vw, 40px);
      letter-spacing: 3px;
      background: linear-gradient(135deg, #ffffff 0%, #e5e5e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-block;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .back-link:hover {
      background: linear-gradient(135deg, #B91C1C 0%, #DC2626 100%);
      border-color: #DC2626;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(185, 28, 28, 0.4);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .logo {
        width: 100px;
      }

      h1 {
        letter-spacing: 4px;
      }

      .video-container {
        border-radius: 12px;
        max-width: 100%;
      }

      .play-button {
        width: 60px;
        height: 60px;
      }

      .play-button::after {
        border-width: 12px 0 12px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="../logo.svg" alt="Court ou Crève" class="logo">
      <h1>SAISON 2</h1>
    </header>

    <div class="video-container">
      <video
        id="teaser"
        poster="../teaser-poster.jpg"
        preload="metadata"
        playsinline
      >
        <source src="../teaser-saison-2.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la lecture de vidéo.
      </video>
      <div class="play-button" id="playBtn"></div>
    </div>

    <div class="diffusion">
      <div class="diffusion-label">Diffusion</div>
      <div class="diffusion-date">Dimanche 15 Mars</div>
      <a href="../" class="back-link">← Retour au site</a>
    </div>
  </div>

  <script>
    const video = document.getElementById('teaser');
    const playBtn = document.getElementById('playBtn');

    // Play/pause avec bouton ou clic sur vidéo
    function togglePlay() {
      if (video.paused) {
        video.play();
        video.setAttribute('playing', '');
      } else {
        video.pause();
        video.removeAttribute('playing');
      }
    }

    playBtn.addEventListener('click', togglePlay);
    video.addEventListener('click', togglePlay);

    // Gérer l'état du bouton play
    video.addEventListener('play', () => {
      video.setAttribute('playing', '');
    });

    video.addEventListener('pause', () => {
      video.removeAttribute('playing');
    });

    video.addEventListener('ended', () => {
      video.removeAttribute('playing');
    });

    // Afficher le bouton au chargement
    video.addEventListener('loadedmetadata', () => {
      if (video.paused) {
        playBtn.style.opacity = '1';
        playBtn.style.pointerEvents = 'auto';
      }
    });
  </script>
</body>
</html>
