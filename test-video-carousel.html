<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Vidéo + Photos - Court ou Crève</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --red: #DC2626;
      --red-dark: #B91C1C;
      --white: #fff;
      --gray: #a0a0a0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
    }

    /* Hero Split Screen - comme la home */
    .hero-split {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }

    /* LEFT: Video Carousel */
    .hero-left {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black);
      overflow: hidden;
    }

    .hero-left::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(220,38,38,0.3), transparent);
      z-index: 2;
    }

    /* Video Container */
    .video-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-slide.active {
      opacity: 1;
      z-index: 1;
    }

    .video-slide video {
      width: 90%;
      height: 90%;
      object-fit: contain;
      border-radius: 8px;
    }

    /* Video overlay effects */
    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 100%),
        repeating-linear-gradient(
          0deg,
          rgba(0,0,0,0.08) 0px,
          rgba(0,0,0,0.08) 2px,
          transparent 2px,
          transparent 4px
        );
      pointer-events: none;
      z-index: 2;
    }

    /* Navigation controls */
    .carousel-nav {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 10;
      align-items: center;
    }

    .nav-arrow {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 8px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .nav-arrow:hover {
      background: var(--red);
      border-color: var(--red);
      transform: translateY(-2px);
    }

    .nav-arrow svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* Dots */
    .dots-nav {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: var(--red);
      transform: scale(1.3);
    }

    /* Play button */
    .play-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.9), rgba(220, 38, 38, 0.95));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 32px rgba(185, 28, 28, 0.4);
      z-index: 5;
      opacity: 0;
    }

    .video-slide:not(.playing) .play-overlay {
      opacity: 1;
    }

    .play-overlay::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 22px solid white;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      margin-left: 6px;
    }

    .play-overlay:hover {
      transform: translate(-50%, -50%) scale(1.1);
      background: var(--red);
    }

    /* Video info */
    .video-info {
      position: absolute;
      top: 40px;
      left: 40px;
      z-index: 5;
      max-width: 400px;
    }

    .video-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .video-description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* RIGHT: Photos Gallery */
    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      background: var(--black);
      position: relative;
      overflow-y: auto;
    }

    .gallery-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 40px;
      text-align: center;
    }

    .gallery-title span {
      color: var(--red);
    }

    .photos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 600px;
      width: 100%;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .photo-item:hover {
      transform: scale(1.05);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .photo-item:hover .photo-overlay {
      opacity: 1;
    }

    .photo-caption {
      color: var(--white);
      font-size: 14px;
      font-weight: 600;
    }

    /* Mobile responsive */
    @media (max-width: 900px) {
      .hero-split {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .hero-left {
        min-height: 70vh;
      }

      .hero-left::after {
        display: none;
      }

      .hero-right {
        padding: 40px 20px;
      }

      .photos-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .video-info {
        top: 20px;
        left: 20px;
        right: 20px;
        max-width: none;
      }

      .video-title {
        font-size: 22px;
      }

      .carousel-nav {
        bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="hero-split">
    <!-- LEFT: Video Carousel -->
    <div class="hero-left">
      <div class="video-wrapper">
        <!-- Video slides -->
        <div class="video-slide active" data-index="0">
          <video muted loop playsinline preload="metadata" poster="video-poster.jpg">
            <source src="video-preview.mp4" type="video/mp4">
          </video>
          <div class="play-overlay"></div>
        </div>

        <div class="video-slide" data-index="1">
          <video muted loop playsinline preload="metadata" poster="video-manifesto-poster.jpg">
            <source src="video-manifesto.mp4" type="video/mp4">
          </video>
          <div class="play-overlay"></div>
        </div>

        <div class="video-slide" data-index="2">
          <video muted loop playsinline preload="metadata" poster="teaser-poster.jpg">
            <source src="teaser-saison-2.mp4" type="video/mp4">
          </video>
          <div class="play-overlay"></div>
        </div>

        <div class="video-slide" data-index="3">
          <video muted loop playsinline preload="metadata" poster="video-poster.jpg">
            <source src="video-preview-old.mp4" type="video/mp4">
          </video>
          <div class="play-overlay"></div>
        </div>

        <!-- Overlay effects -->
        <div class="video-overlay"></div>

        <!-- Video info -->
        <div class="video-info">
          <h2 class="video-title" id="videoTitle">Bande Annonce Saison 1</h2>
          <p class="video-description" id="videoDesc">Découvre les coulisses de la première saison</p>
        </div>

        <!-- Navigation -->
        <div class="carousel-nav">
          <button class="nav-arrow prev" aria-label="Vidéo précédente">
            <svg viewBox="0 0 24 24">
              <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </button>

          <div class="dots-nav" id="dotsNav"></div>

          <button class="nav-arrow next" aria-label="Vidéo suivante">
            <svg viewBox="0 0 24 24">
              <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Photos Gallery -->
    <div class="hero-right">
      <h2 class="gallery-title">En coulisses <span>📸</span></h2>

      <div class="photos-grid">
        <div class="photo-item">
          <img src="photo1.jpg" alt="Tournage Saison 1" loading="lazy">
          <div class="photo-overlay">
            <p class="photo-caption">Tournage Saison 1</p>
          </div>
        </div>

        <div class="photo-item">
          <img src="photo2.jpg" alt="Équipe technique" loading="lazy">
          <div class="photo-overlay">
            <p class="photo-caption">Équipe technique</p>
          </div>
        </div>

        <div class="photo-item">
          <img src="photo3.jpg" alt="Coulisses plateau" loading="lazy">
          <div class="photo-overlay">
            <p class="photo-caption">Coulisses plateau</p>
          </div>
        </div>

        <div class="photo-item">
          <img src="photo4.jpg" alt="Post-production" loading="lazy">
          <div class="photo-overlay">
            <p class="photo-caption">Post-production</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const videos = [
      {
        title: 'Bande Annonce Saison 1',
        description: 'Découvre les coulisses de la première saison'
      },
      {
        title: 'Manifeste Court ou Crève',
        description: 'La vision et les valeurs derrière le projet'
      },
      {
        title: 'Teaser Saison 2',
        description: 'Un aperçu de ce qui t\'attend pour la saison 2'
      },
      {
        title: 'Archives Saison 1',
        description: 'Version alternative de la bande annonce'
      }
    ];

    let currentIndex = 0;
    const slides = document.querySelectorAll('.video-slide');
    const dotsNav = document.getElementById('dotsNav');
    const videoTitle = document.getElementById('videoTitle');
    const videoDesc = document.getElementById('videoDesc');

    // Create dots
    function createDots() {
      slides.forEach((_, index) => {
        const dot = document.createElement('div');
        dot.className = `dot ${index === 0 ? 'active' : ''}`;
        dot.addEventListener('click', () => goToSlide(index));
        dotsNav.appendChild(dot);
      });
    }

    // Update info
    function updateInfo(index) {
      videoTitle.textContent = videos[index].title;
      videoDesc.textContent = videos[index].description;
    }

    // Go to specific slide with fade
    function goToSlide(index) {
      // Stop all videos
      slides.forEach(slide => {
        const video = slide.querySelector('video');
        video.pause();
        video.currentTime = 0;
        slide.classList.remove('active', 'playing');
      });

      // Update current
      currentIndex = index;

      // Fade in new slide
      slides[currentIndex].classList.add('active');

      // Update dots
      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });

      // Update info
      updateInfo(currentIndex);
    }

    // Navigation
    document.querySelector('.nav-arrow.prev').addEventListener('click', () => {
      const newIndex = (currentIndex - 1 + slides.length) % slides.length;
      goToSlide(newIndex);
    });

    document.querySelector('.nav-arrow.next').addEventListener('click', () => {
      const newIndex = (currentIndex + 1) % slides.length;
      goToSlide(newIndex);
    });

    // Play/Pause
    document.querySelectorAll('.play-overlay').forEach((btn, index) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const slide = slides[index];
        const video = slide.querySelector('video');

        if (video.paused) {
          video.muted = false;
          video.play();
          slide.classList.add('playing');
        } else {
          video.pause();
          slide.classList.remove('playing');
        }
      });
    });

    // Click on video to play/pause
    slides.forEach((slide, index) => {
      const video = slide.querySelector('video');
      video.addEventListener('click', () => {
        if (video.paused) {
          video.muted = false;
          video.play();
          slide.classList.add('playing');
        } else {
          video.pause();
          slide.classList.remove('playing');
        }
      });
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        document.querySelector('.nav-arrow.prev').click();
      } else if (e.key === 'ArrowRight') {
        document.querySelector('.nav-arrow.next').click();
      }
    });

    // Swipe on mobile
    let touchStartX = 0;
    let touchEndX = 0;

    document.querySelector('.hero-left').addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.querySelector('.hero-left').addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const swipeThreshold = 50;
      if (touchEndX < touchStartX - swipeThreshold) {
        document.querySelector('.nav-arrow.next').click();
      } else if (touchEndX > touchStartX + swipeThreshold) {
        document.querySelector('.nav-arrow.prev').click();
      }
    }, { passive: true });

    // Init
    createDots();
  </script>
</body>
</html>
